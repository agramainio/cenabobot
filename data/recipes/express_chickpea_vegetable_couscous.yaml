notes: >-
  Cuire les légumes dans la tomate avec les épices. Ajouter les pois chiches.
  Servir avec la semoule réhydratée.
concerns_or_tag_ambiguity: >-
  L’épice est optionnelle pour éviter de rendre la recette trop spécifique.
