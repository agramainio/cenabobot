ingredients:
  - name: pois cassés
    quantity: 180
    unit: g
    category: épicerie
    optional: false
  - name: carottes
    quantity: 2
    unit: pièces
    category: légumes
    optional: false
  - name: oignon
    quantity: 1
    unit: pièce
    category: légumes
    optional: false
  - name: bouillon de légumes
    quantity: 800
    unit: ml
    category: épicerie
    optional: false
  - name: laurier
    quantity: 1
    unit: feuille
    category: herbes
    optional: true
