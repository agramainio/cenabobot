notes: >-
  Faire revenir l’oignon et les carottes. Ajouter les pois cassés et le bouillon.
  Cuire jusqu’à tendreté. Mixer ou garder tel quel.
concerns_or_tag_ambiguity: >-
  Pas fast, car les pois cassés demandent souvent 35 à 45 minutes de cuisson.
